{% extends "base.html" %}

{% block title %}View Income{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h2>My Income</h2>

<a href="/add-income" class="btn btn-success">
Add Income
</a>

</div>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>Amount</th>
<th>Source</th>
<th>Date</th>
<th>Description</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for i in income %}

<tr>

<td>₹ {{ i[1] }}</td>
<td>{{ i[2] }}</td>
<td>{{ i[3] }}</td>
<td>{{ i[4] }}</td>

<td>

<a href="{{ url_for('edit_income', income_id=i[0]) }}"
class="btn btn-warning btn-sm">
Edit
</a>

<a href="{{ url_for('delete_income_route', income_id=i[0]) }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this income?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
