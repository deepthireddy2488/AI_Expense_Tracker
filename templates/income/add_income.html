{% extends "base.html" %}

{% block title %}Add Income{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h3>Add Income</h3>
            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Amount</label>
                        <input type="number" step="0.01"
                               class="form-control"
                               name="amount" required>
                    </div>

                    <div class="mb-3">
                        <label>Source</label>
                        <input type="text"
                               class="form-control"
                               name="source" required>
                    </div>

                    <div class="mb-3">
                        <label>Income Date</label>
                        <input type="date"
                               class="form-control"
                               name="income_date" required>
                    </div>

                    <div class="mb-3">
                        <label>Description</label>
                        <textarea class="form-control"
                                  name="description"
                                  rows="3"></textarea>
                    </div>

                    <button class="btn btn-success w-100">
                        Add Income
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
