{% extends "base.html" %}

{% block title %}Edit Income{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card shadow">

<div class="card-header bg-warning">
<h3>Edit Income</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Amount</label>

<input type="number"
step="0.01"
class="form-control"
name="amount"
value="{{ income[1] }}"
required>

</div>

<div class="mb-3">

<label>Source</label>

<input type="text"
class="form-control"
name="source"
value="{{ income[2] }}"
required>

</div>

<div class="mb-3">

<label>Date</label>

<input type="date"
class="form-control"
name="income_date"
value="{{ income[3] }}"
required>

</div>

<div class="mb-3">

<label>Description</label>

<textarea
class="form-control"
name="description"
rows="3">{{ income[4] }}</textarea>

</div>

<button class="btn btn-warning w-100">

Update Income

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
