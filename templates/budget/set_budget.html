{% extends "base.html" %}

{% block title %}Set Budget{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-warning">
<h3>Set Monthly Budget</h3>
</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Month</label>
<input type="number" class="form-control" name="month" min="1" max="12" required>
</div>

<div class="mb-3">
<label>Year</label>
<input type="number" class="form-control" name="year" required>
</div>

<div class="mb-3">
<label>Budget Amount</label>
<input type="number" step="0.01" class="form-control" name="budget_amount" required>
</div>

<button class="btn btn-warning w-100">
Save Budget
</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
