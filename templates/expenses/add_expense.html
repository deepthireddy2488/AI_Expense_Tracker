{% extends "base.html" %}

{% block title %}
Add Expense
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Add Expense</h3>

            </div>

            <div class="card-body">

                <form method="POST" autocomplete="off">

                    <div class="mb-3">

                        <label class="form-label">Category</label>

                        <select class="form-select"
                                name="category_id"
                                required>

                             <option value="">Select Category</option>

                            {% for category in categories %}

                                <option value="{{ category[0] }}">
                                       {{ category[1] }}
                                </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Amount
                        </label>

                        <input
                           type="number"
                           step="0.01"
                          class="form-control"
                          name="amount"
                          autocomplete="off"
                          required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Payment Method
                        </label>

                        <select class="form-select"
                                name="payment_method">

                            <option>Cash</option>
                            <option>UPI</option>
                            <option>Credit Card</option>
                            <option>Debit Card</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Expense Date
                        </label>

                        <input type="date"
                               class="form-control"
                               name="expense_date"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            class="form-control"
                            name="description"
                            rows="3"></textarea>

                    </div>

                    <button class="btn btn-success w-100">

                        Add Expense

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
