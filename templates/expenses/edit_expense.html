{% extends "base.html" %}

{% block title %}
Edit Expense
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-warning text-dark">

                <h3>Edit Expense</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">Category</label>

                        <select class="form-select"
                                name="category_id"
                                required>

                            {% for category in categories %}

                                <option value="{{ category[0] }}"
                                    {% if category[0] == expense[1] %}
                                        selected
                                    {% endif %}>

                                    {{ category[1] }}

                                </option>

                            {% endfor %}

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Amount

                        </label>

                        <input type="number"
                               step="0.01"
                               class="form-control"
                               name="amount"
                               value="{{ expense[2] }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Payment Method

                        </label>

                        <select class="form-select"
                                name="payment_method">

                            <option {% if expense[3]=="Cash" %}selected{% endif %}>Cash</option>

                            <option {% if expense[3]=="UPI" %}selected{% endif %}>UPI</option>

                            <option {% if expense[3]=="Credit Card" %}selected{% endif %}>Credit Card</option>

                            <option {% if expense[3]=="Debit Card" %}selected{% endif %}>Debit Card</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Expense Date

                        </label>

                        <input type="date"
                               class="form-control"
                               name="expense_date"
                               value="{{ expense[4] }}"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Description

                        </label>

                        <textarea
                            class="form-control"
                            name="description"
                            rows="3">{{ expense[5] }}</textarea>

                    </div>

                    <button class="btn btn-warning w-100">

                        Update Expense

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
